repos:
  - repo: local
    hooks:
      - id: black
        name: black
        entry: poetry run black --check src tests
        language: system
        pass_filenames: false
      - id: flake8
        name: flake8
        entry: poetry run flake8 src tests
        language: system
        pass_filenames: false
      - id: pytest
        name: pytest
        entry: poetry run pytest
        language: system
        pass_filenames: false
        always_run: true
